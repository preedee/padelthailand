<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tournament Dashboard</title>
  <link rel="icon" href="/assets/tps-favicon.png">
  <link rel="stylesheet" href="css/styles.css?v=127">
</head>
<body>
  <div class="dashboard">

    <!-- Header -->
    <header class="header">
      <a href="#" class="header__left header__home-link" id="home-link">
        <img src="assets/lps-logo.jpeg" alt="Event Logo" class="header__lps-logo">
      </a>
      <div class="header__title">
        <h1>Tournament</h1>
        <p>Dashboard</p>
      </div>
      <div class="header__right">
        <img src="assets/tps-logo-green.png" alt="Partner Logo" class="header__tps-logo">
      </div>
    </header>

    <!-- View Indicator Bar (generated dynamically) -->
    <nav class="view-bar" id="view-bar"></nav>

    <!-- Content Area: Main + Sidebar -->
    <div class="content-area">
      <!-- Main Content (views generated dynamically) -->
      <main class="main-content" id="main-content">
        <section class="view active" id="view-loading">
          <div class="loading">Loading tournament data...</div>
        </section>
      </main>

      <!-- Sidebar: Upcoming Matches (always visible) -->
      <aside class="sidebar" id="sidebar-upcoming">
        <div class="sidebar__title">Upcoming Matches</div>
        <div class="sidebar__content">
          <div class="loading">Loading...</div>
        </div>
      </aside>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer__powered">
        <img src="assets/favicon.png" alt="The Padel Society" class="footer__tps-logo">
        <span class="footer__powered-text">Powered by The Padel Society</span>
      </div>
      <span class="footer__timestamp" id="last-updated">Last updated: --</span>
    </footer>

  </div>

  <script src="js/data.js?v=127"></script>
  <script src="js/standings.js?v=127"></script>
  <script src="js/matches.js?v=127"></script>
  <script src="js/bracket.js?v=127"></script>
  <script src="js/app.js?v=127"></script>
</body>
</html>
