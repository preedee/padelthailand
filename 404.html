<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padel Thailand</title>
  <script>
    (function() {
      var path = window.location.pathname;
      // Handle /organizer/slug routes
      var orgMatch = path.match(/^\/organizer\/([^/]+)\/?$/);
      if (orgMatch) {
        window.location.replace('/organizer.html?slug=' + encodeURIComponent(orgMatch[1]));
        return;
      }
      // Handle /competitions/slug routes
      var compMatch = path.match(/^\/competitions\/([^/]+)\/?$/);
      if (compMatch) {
        window.location.replace('/competition.html?slug=' + encodeURIComponent(compMatch[1]));
        return;
      }
      // For any other 404, redirect to home
      window.location.replace('/');
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
