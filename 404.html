<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padel Thailand</title>
  <script>
    (function() {
      var path = window.location.pathname;
      // Store the original clean URL path, then redirect to the HTML page.
      // The target page will use history.replaceState to restore the clean URL.
      var orgMatch = path.match(/^\/organizer\/([^/]+)\/?$/);
      if (orgMatch) {
        sessionStorage.setItem('spa-redirect', path);
        window.location.replace('/organizer.html');
        return;
      }
      var compMatch = path.match(/^\/competitions\/([^/]+)\/?$/);
      if (compMatch) {
        sessionStorage.setItem('spa-redirect', path);
        window.location.replace('/competition.html');
        return;
      }
      // For any other 404, redirect to home
      window.location.replace('/');
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
