<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Royal Padel Association Thailand — Tournament Dashboard</title>
  <link rel="icon" href="assets/favicon.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="dashboard">

    <!-- Header — Royal Padel Association (dark) -->
    <header class="header">
      <div class="header__left">
        <img src="assets/rpa-logo.png" alt="Royal Padel Association" class="header__rpa-logo"
             onerror="this.style.display='none'">
      </div>
      <div class="header__title">
        <h1>Royal Padel Association Thailand</h1>
        <p>Tournament Dashboard</p>
      </div>
      <div class="header__right">
        <img src="assets/tps-logo-white.png" alt="The Padel Society" class="header__tps-logo">
      </div>
    </header>

    <!-- View Indicator Bar -->
    <nav class="view-bar">
      <button class="view-bar__tab active" data-view="standings">Group Standings</button>
      <button class="view-bar__tab" data-view="matches">Live Matches</button>
      <button class="view-bar__tab" data-view="bracket">Knockout Bracket</button>
      <div class="view-bar__dots">
        <span class="view-bar__dot active"></span>
        <span class="view-bar__dot"></span>
        <span class="view-bar__dot"></span>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <!-- View: Standings -->
      <section class="view active" id="view-standings">
        <div class="loading">Loading tournament data...</div>
      </section>

      <!-- View: Matches -->
      <section class="view" id="view-matches">
        <div class="loading">Loading match data...</div>
      </section>

      <!-- View: Bracket -->
      <section class="view" id="view-bracket">
        <div class="loading">Loading bracket data...</div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer__logos">
        <img src="assets/rpa-logo.png" alt="RPA" class="footer__logo"
             onerror="this.style.display='none'">
        <img src="assets/tps-logo-white.png" alt="TPS" class="footer__logo">
      </div>
      <span class="footer__timestamp" id="last-updated">Last updated: --</span>
    </footer>

  </div>

  <script src="js/data.js?v=3"></script>
  <script src="js/standings.js?v=3"></script>
  <script src="js/matches.js?v=3"></script>
  <script src="js/bracket.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
</body>
</html>
